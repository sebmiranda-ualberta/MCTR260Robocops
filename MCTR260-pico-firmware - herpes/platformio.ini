; PlatformIO Project Configuration for Raspberry Pi Pico W (2022)
; Robot Controller Firmware - Matches ESP32 functionality

[env:pico_w]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino
board_build.core = earlephilhower

; Build configuration
build_flags = 
    -DPICO_STDIO_USB=1
    -I src
    -I src/core
    -I src/drivers
    -I src/profiles
    ; Enable Bluetooth Classic and BLE stack
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_BLUETOOTH

; Serial monitor
monitor_speed = 115200

; Upload configuration
; Use mass-storage mode (drag-drop to RPI-RP2 drive)
; If upload fails, manually copy .pio/build/pico_w/firmware.uf2 to the drive
upload_protocol = picotool

; Library dependencies
lib_deps = 
    bblanchon/ArduinoJson@^7.0.0

; Build type
build_type = release
